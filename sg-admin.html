                    </div>
                  </td>
                </tr>
              `).join('')}
              ${admins.length===0?`<tr><td colspan="6"><div class="empty"><div class="empty-icon">🔐</div><div class="empty-title">No admins</div></div></td></tr>`:''}
            </tbody>
          </table>
        </div>
      </div>
    `;
  },

  addAdminModal(){
    if(!this.isSuperAdmin()){toast('Only Super Admins can create admin accounts','error');return;}
    document.getElementById('modalTitle').textContent='Add Admin Account';
    document.getElementById('modalBody').innerHTML=`
      <div class="form-group"><div class="form-label">Full Name *</div><input class="form-control" id="aName" placeholder="e.g. Priya Admin"></div>
      <div class="form-group">
        <div class="form-label">Username * <span style="font-weight:400;color:var(--muted)">(used to login)</span></div>
        <input class="form-control" id="aUser" placeholder="e.g. priya (no spaces)" oninput="this.value=this.value.replace(/\\s/g,'').toLowerCase()">
      </div>
      <div class="form-group"><div class="form-label">Password *</div><input class="form-control" id="aPwd" type="text" placeholder="Set a strong password"></div>
      <div class="form-group"><div class="form-label">Role</div>
        <select class="form-control" id="aRole">
          <option value="admin">🛡 Admin (No Settings access)</option>
          <option value="superadmin">👑 Super Admin (Full access)</option>
        </select>
      </div>
      <div style="background:var(--bg3);border-radius:9px;padding:10px 13px;font-size:11px;color:var(--muted);margin-bottom:14px">
        ℹ <strong>Admin</strong> can access Requests, Customers, Technicians, Reports.<br>
        <strong>Super Admin</strong> has full access including Admin Account management.
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-primary" style="flex:2;justify-content:center" onclick="Admin.saveNewAdmin()">Create Admin →</button>
        <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="Admin.closeModal()">Cancel</button>
      </div>
    `;
    document.getElementById('modal').classList.add('open');
  },

  saveNewAdmin(){
    if(!this.isSuperAdmin()){toast('Only Super Admins can create admin accounts','error');return;}
    const name=document.getElementById('aName')?.value.trim();
    const username=document.getElementById('aUser')?.value.trim().toLowerCase();
    const pwd=document.getElementById('aPwd')?.value.trim();
    const role=document.getElementById('aRole')?.value||'admin';

    // Validations
    if(!name){toast('Full name is required','error');return;}
    if(!username||username.length<3){toast('Username must be at least 3 characters, no spaces','error');return;}
    if(!pwd||pwd.length<4){toast('Password must be at least 4 characters','error');return;}

    const admins=this.getAdmins();
    if(admins.some(a=>a.username===username)){toast('This username is already taken. Choose another.','error');return;}

    const newAdmin={
      id:DB.uid('admin'),
      name:name,
      username:username,
      password:pwd,
      role:role,
      createdAt:new Date().toISOString()
    };
    admins.push(newAdmin);
    DB.set('admins',admins);

    this.closeModal();
    toast(`✅ Admin "${name}" (@${username}) created with role: ${role}`);
    this.renderAdmins(document.getElementById('content'));
  },

  editAdminModal(id){
    if(!this.isSuperAdmin()){toast('Only Super Admins can edit admin accounts','error');return;}
    const a=this.getAdmins().find(x=>x.id===id);
    if(!a) return;
    const isMe=a.id===this.adminUser?.id;
    document.getElementById('modalTitle').textContent='Edit Admin – '+esc(a.name);
    document.getElementById('modalBody').innerHTML=`
      <div class="form-group"><div class="form-label">Full Name *</div><input class="form-control" id="aName" value="${esc(a.name)}"></div>
      <div class="form-group"><div class="form-label">Username *</div><input class="form-control" id="aUser" value="${esc(a.username)}" oninput="this.value=this.value.replace(/\\s/g,'').toLowerCase()"></div>
      <div class="form-group"><div class="form-label">Password <span style="font-weight:400;color:var(--muted)">(leave blank to keep)</span></div><input class="form-control" id="aPwd" type="text" placeholder="New password…"></div>
      <div class="form-group"><div class="form-label">Role</div>
        <select class="form-control" id="aRole" ${isMe?'disabled':''}>
          <option value="admin" ${(a.role||'admin')==='admin'?'selected':''}>🛡 Admin</option>
          <option value="superadmin" ${a.role==='superadmin'?'selected':''}>👑 Super Admin</option>
        </select>
        ${isMe?`<div style="font-size:10px;color:var(--muted);margin-top:4px">⚠ Cannot change your own role</div>`:''}
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-primary" style="flex:2;justify-content:center" onclick="Admin.saveAdminEdit('${id}')">Save Changes</button>
        ${!isMe?`<button class="btn btn-danger" style="flex:1;justify-content:center" onclick="Admin.deleteAdmin('${id}')">Delete</button>`:`<button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="Admin.closeModal()">Cancel</button>`}
      </div>
    `;
    document.getElementById('modal').classList.add('open');
  },

  saveAdminEdit(id){
    if(!this.isSuperAdmin()){toast('Only Super Admins can edit admin accounts','error');return;}
    const name=document.getElementById('aName')?.value.trim();
    const username=document.getElementById('aUser')?.value.trim().toLowerCase();
    const pwd=document.getElementById('aPwd')?.value.trim();
    const roleEl=document.getElementById('aRole');
    const role=roleEl&&!roleEl.disabled?roleEl.value:undefined;

    if(!name){toast('Name required','error');return;}
    if(!username||username.length<3){toast('Username min 3 chars','error');return;}

    const admins=this.getAdmins();
    if(admins.some(a=>a.username===username&&a.id!==id)){toast('Username already taken','error');return;}

    const idx=admins.findIndex(a=>a.id===id);
    if(idx>-1){
      admins[idx].name=name;
      admins[idx].username=username;
      if(pwd) admins[idx].password=pwd;
      if(role&&admins[idx].id!==this.adminUser?.id) admins[idx].role=role;
      if(admins[idx].id===this.adminUser?.id){
        this.adminUser=admins[idx];
        DB.set('adminUser',admins[idx]);
        const chip=document.getElementById('adminChip');
        if(chip){
          const roleLabel=this.isSuperAdmin()?'<span style="font-size:9px;background:linear-gradient(135deg,#7c3aed,var(--acc));color:#fff;border-radius:10px;padding:1px 6px;font-weight:800;margin-left:3px">SUPER</span>':'';
          chip.innerHTML=`<div class="admin-avatar">${admins[idx].name[0]}</div><div><div class="admin-name">${esc(admins[idx].name)}${roleLabel}</div><div class="admin-role">${this.isSuperAdmin()?'Super Administrator':'Administrator'}</div></div>`;
        }
      }
    }
    DB.set('admins',admins);
    this.closeModal();
    toast('Admin updated!');
    this.renderAdmins(document.getElementById('content'));
  },

  deleteAdmin(id){
    if(!this.isSuperAdmin()){toast('Only Super Admins can delete admin accounts','error');return;}
    if(id===this.adminUser?.id){toast("Can't delete your own account",'error');return;}
    const a=this.getAdmins().find(x=>x.id===id);
    if(!a||!confirm(`Delete admin "${a.name}"? This cannot be undone.`)) return;
    if(this.getAdmins().length<=1){toast('At least one admin must exist','error');return;}
    DB.set('admins',this.getAdmins().filter(x=>x.id!==id));
    this.closeModal();
    toast('Admin deleted');
    this.renderAdmins(document.getElementById('content'));
  },

  changeMyPassword(){
    const me=this.adminUser;
    document.getElementById('modalTitle').textContent='🔑 Change My Password';
    document.getElementById('modalBody').innerHTML=`
      <div style="background:var(--bg3);border-radius:10px;padding:11px;margin-bottom:14px;font-size:12px">
        Changing password for <strong>@${esc(me?.username)}</strong>
      </div>
      <div class="form-group"><div class="form-label">Current Password *</div><input class="form-control" id="curPwd" type="password" placeholder="Enter current password"></div>
      <div class="form-group"><div class="form-label">New Password *</div><input class="form-control" id="newPwd" type="password" placeholder="Min 4 characters"></div>
      <div class="form-group"><div class="form-label">Confirm New Password *</div><input class="form-control" id="confPwd" type="password" placeholder="Re-enter new password"></div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-primary" style="flex:2;justify-content:center" onclick="Admin.doChangePassword()">Update Password →</button>
        <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="Admin.closeModal()">Cancel</button>
      </div>
    `;
    document.getElementById('modal').classList.add('open');
  },

  doChangePassword(){
    const cur=document.getElementById('curPwd')?.value;
    const nw=document.getElementById('newPwd')?.value.trim();
    const conf=document.getElementById('confPwd')?.value.trim();
    if(!cur||!nw||!conf){toast('All fields required','error');return;}
    const admins=this.getAdmins();
    const idx=admins.findIndex(a=>a.id===this.adminUser?.id);
    if(idx===-1||admins[idx].password!==cur){toast('Current password incorrect','error');return;}
    if(nw.length<4){toast('New password min 4 characters','error');return;}
    if(nw!==conf){toast('Passwords do not match','error');return;}
    admins[idx].password=nw;
    this.adminUser.password=nw;
    DB.set('admins',admins);
    DB.set('adminUser',this.adminUser);
    this.closeModal();
    toast('Password changed successfully! 🔐');
  },

  startPolling(){
    this._pollInterval=setInterval(()=>{
      if(!this.adminUser) return;
      const notify=DB.get('newRequest_notify');
      if(notify&&notify.ts>this._lastSeen){
        this._lastSeen=notify.ts;
        toast('🔔 New service request!','info');
        document.getElementById('notifDot').style.display='block';
        this.updateCounters();
      }
    },3000);
  },

  refreshData(){
    this.updateCounters();
    toast('Data refreshed','info');
    const title=document.getElementById('topbarTitle').textContent;
    const pages={Dashboard:'dashboard','All Requests':'requests','Pending Requests':'pending','Assigned Requests':'assigned','Completed Requests':'completed',Customers:'customers',Technicians:'technicians',Reports:'reports','Admin Accounts':'admins'};
    const pg=pages[title];
    if(pg) this.page(pg);
  },

  closeModal(e){
    if(!e||e.target===document.getElementById('modal'))
      document.getElementById('modal').classList.remove('open');
  },

  resetCredentials(){
    // Force-clear adminUser session and reset Vignesh credentials
    DB.set('adminUser', null);
    let admins = DB.get('admins') || [];
    const vIdx = admins.findIndex(a => a.id === 'admin_1' || a.username === 'Vignesh');
    if(vIdx === -1){
      admins.unshift({id:'admin_1',username:'Vignesh',password:'vicky@sg',name:'Vignesh',role:'superadmin',createdAt:new Date().toISOString()});
    } else {
      admins[vIdx].username = 'Vignesh';
      admins[vIdx].password = 'vicky@sg';
      admins[vIdx].role = 'superadmin';
    }
    DB.set('admins', admins);
    document.getElementById('liUser').value = 'Vignesh';
    document.getElementById('liPwd').value = 'vicky@sg';
    toast('Credentials reset! Username: Vignesh | Password: vicky@sg', 'info');
  },
};

Admin.init();
</script>
</body>
</html>
